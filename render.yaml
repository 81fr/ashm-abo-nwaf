services:
  - type: web
    name: ashm-abo-nwaf
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -w 4 -b 0.0.0.0:$PORT web.app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: FLASK_DEBUG
        value: 0
      - key: GROQ_API_KEY
        sync: false
