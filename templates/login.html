<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAGLES OF SPX - تسجيل الدخول</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Cairo:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
    <div class="login-wrapper">
        <div style="position: absolute; top: 20px; right: 20px; z-index: 100;">
            {% if lang == 'ar' %}
            <a href="{{ url_for('set_lang', lang='en') }}" class="btn-primary" style="text-decoration: none; padding: 5px 15px; font-size: 0.8rem;">English</a>
            {% else %}
            <a href="{{ url_for('set_lang', lang='ar') }}" class="btn-primary" style="text-decoration: none; padding: 5px 15px; font-size: 0.8rem; font-family: 'Cairo', sans-serif;">العربية</a>
            {% endif %}
        </div>

        <div class="login-container glass-panel">
            <div class="logo-container">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="EAGLES OF SPX Logo" class="logo">
                <h1>EAGLES OF SPX</h1>
                <p class="login-subtitle">{{ t.login_subtitle }}</p>
            </div>

            <form method="POST" class="login-form">
                {% if error %}
                <div class="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    <span>{{ error }}</span>
                </div>
                {% endif %}

                <div class="input-group">
                    <input type="text" name="username" placeholder="{{ t.username }}" required autocomplete="off">
                    <i class="fas fa-user input-icon"></i>
                </div>

                <div class="input-group" style="position: relative;">
                    <input type="password" name="password" id="password-field" placeholder="{{ t.password }}" required style="padding-left: 45px;">
                    <i class="fas fa-lock input-icon"></i>
                    <i class="fas fa-eye" id="toggle-password" style="position: absolute; {{ 'left' if lang == 'ar' else 'right' }}: 15px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.6); cursor: pointer; z-index: 10;" onclick="toggleLoginPass()"></i>
                </div>

                <input type="hidden" name="device_id" id="device_id">

                <button type="submit" class="login-btn">
                    {{ t.login_btn }}
                    <i class="fas fa-arrow-{{ 'left' if lang == 'ar' else 'right' }}" style="margin-{{ 'right' if lang == 'ar' else 'left' }}: 8px;"></i>
                </button>
            </form>

            <div class="contact-section">
                <p>{{ t.contact_us }}</p>
                <div class="social-icons">
                    <a href="https://t.me/Eagles_of_spx" target="_blank" class="social-link telegram"><i
                            class="fab fa-telegram-plane"></i></a>
                    <a href="https://tiktok.com/@eagles_of_spx" target="_blank" class="social-link tiktok"><i
                            class="fab fa-tiktok"></i></a>
                    <a href="https://wa.me/0530131193" target="_blank" class="social-link whatsapp"><i
                            class="fab fa-whatsapp"></i></a>
                </div>
                <div class="contact-number">0530131193</div>
            </div>
        </div>
    </div>

    <script>
        function toggleLoginPass() {
            const passField = document.getElementById('password-field');
            const toggleIcon = document.getElementById('toggle-password');
            if (passField.type === 'password') {
                passField.type = 'text';
                toggleIcon.className = 'fas fa-eye-slash';
            } else {
                passField.type = 'password';
                toggleIcon.className = 'fas fa-eye';
            }
        }

        // Device ID Generation and Tracking
        document.addEventListener('DOMContentLoaded', () => {
            let deviceId = localStorage.getItem('eagle_device_id');
            if (!deviceId) {
                // Generate a relatively unique ID
                deviceId = 'dev_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now().toString(36);
                localStorage.setItem('eagle_device_id', deviceId);
            }
            document.getElementById('device_id').value = deviceId;
        });
    </script>
</body>

</html>
